name: Fetch, Fix & Deploy IDA Planner
on:
  workflow_dispatch:
jobs:
  fix-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch live index.html
        run: curl -L -o index.html https://endo-vatsa-ida.vercel.app/

      - name: Apply JS fix for disclaimerCheck button
        run: |
          python3 - <<'PYEOF'
          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()
          inject = '''
              <script>
              (function() {
                  function initDisclaimer() {
                      var cb = document.getElementById('disclaimerCheck');
                      var btn = document.getElementById('disclaimerAccept');
                      var overlay = document.getElementById('disclaimerOverlay');
                      if (!cb || !btn) return;
                      function updateBtn() {
                          btn.disabled = !cb.checked;
                      }
                      cb.addEventListener('change', updateBtn);
                      btn.addEventListener('click', function() {
                          if (!cb.checked) return;
                          if (overlay) {
                              overlay.style.display = 'none';
                          }
                      });
                      updateBtn();
                  }
                  if (document.readyState === 'loading') {
                      document.addEventListener('DOMContentLoaded', initDisclaimer);
                  } else {
                      initDisclaimer();
                  }
              })();
              </script>
          '''
          fixed = html.replace('</body>', inject + '</body>')
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(fixed)
          print('Fix applied successfully')
          PYEOF

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install -g vercel
          vercel --token $VERCEL_TOKEN --prod --yes
