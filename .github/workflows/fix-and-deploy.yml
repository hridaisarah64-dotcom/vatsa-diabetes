name: Fetch, Fix & Deploy IDA Planner
on:
  workflow_dispatch:
jobs:
  fix-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch live index.html
        run: curl -L -o index.html https://endo-vatsa-ida.vercel.app/

      - name: Apply JS fix for disclaimerCheck button
        run: |
          python3 - <<'PYEOF'
          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()
          inject = '''
          <script>
          (function() {
            function initDisclaimer() {
              var cb = document.getElementById('disclaimerCheck');
              var btn = document.getElementById('disclaimerAccept');
              if (!cb || !btn) return;
              cb.addEventListener('change', function() {
                btn.disabled = !this.checked;
              });
              btn.disabled = !cb.checked;
            }
            if (document.readyState === 'loading') {
              document.addEventListener('DOMContentLoaded', initDisclaimer);
            } else {
              initDisclaimer();
            }
          })();
          </script>
          '''
          fixed = html.replace('</body>', inject + '</body>')
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(fixed)
          print('JS fix injected successfully')
          PYEOF

      - name: Deploy fixed file to Vercel
        run: |
          TOKEN="vcp_6bQaRn5EWIZ80wcvWzCeq1taar4oQWC8ppxQtLZB5m9bbKBDyz3KJyyW"
          TEAM="vatsaendo-s-projects1"
          
          # Step 1: Get SHA256 of the file
          FILE_SHA=$(sha256sum index.html | awk '{print $1}')
          echo "File SHA256: $FILE_SHA"
          
          # Step 2: Upload file to Vercel blob store
          UPLOAD=$(curl -s -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/octet-stream" \
            -H "x-vercel-digest: $FILE_SHA" \
            --data-binary @index.html \
            "https://api.vercel.com/v2/files?teamId=$TEAM")
          echo "Upload response: $UPLOAD"
          
          # Step 3: Create new deployment referencing the file by SHA
          DEPLOY=$(curl -s -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"endo-vatsa-ida\",
              \"files\": [{
                \"file\": \"index.html\",
                \"sha\": \"$FILE_SHA\",
                \"size\": $(wc -c < index.html)
              }],
              \"projectSettings\": { \"framework\": null },
              \"target\": \"production\"
            }" \
            "https://api.vercel.com/v13/deployments?teamId=$TEAM&forceNew=1")
          echo "Deployment: $DEPLOY"
          echo $DEPLOY | python3 -c "import sys,json; d=json.load(sys.stdin); print('URL:', d.get('url','N/A'))"
