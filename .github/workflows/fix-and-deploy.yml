name: Fetch, Fix & Deploy IDA Planner
on:
  workflow_dispatch:
jobs:
  fix-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch live index.html
        run: curl -L -o index.html https://endo-vatsa-ida.vercel.app/

      - name: Apply comprehensive fix
        run: |
          python3 - <<'PYEOF'
          import re
          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()
          # Remove any previously injected fix scripts to avoid double-patching
          html = re.sub(r'\s*<script>\s*\(function\(\)\s*\{.*?\}\)\(\);\s*</script>', '', html, flags=re.DOTALL)
          # Inject the complete fix script before </body>
          inject = '''
              <script>
              (function() {
                  function initDisclaimer() {
                      var cb = document.getElementById('disclaimerCheck');
                      var btn = document.getElementById('disclaimerAccept');
                      var overlay = document.getElementById('disclaimerOverlay');
                      if (!cb || !btn || !overlay) return;
                      function updateBtn() {
                          btn.disabled = !cb.checked;
                      }
                      cb.addEventListener('change', updateBtn);
                      btn.onclick = function(e) {
                          e.preventDefault();
                          e.stopPropagation();
                          if (cb.checked) {
                              overlay.style.cssText = 'display:none !important';
                              overlay.setAttribute('hidden', '');
                              overlay.style.visibility = 'hidden';
                              overlay.style.opacity = '0';
                              overlay.style.pointerEvents = 'none';
                          }
                      };
                      updateBtn();
                  }
                  if (document.readyState === 'loading') {
                      document.addEventListener('DOMContentLoaded', initDisclaimer);
                  } else {
                      initDisclaimer();
                  }
              })();
              </script>
          '''
          fixed = html.replace('</body>', inject + '</body>')
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(fixed)
          print('Fix applied')
          PYEOF

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install -g vercel
          vercel --token $VERCEL_TOKEN --prod --yes
