name: Fetch, Fix & Deploy IDA Planner
on:
  workflow_dispatch:
jobs:
  fix-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch live index.html
        run: curl -L -o index.html https://endo-vatsa-ida.vercel.app/

      - name: Apply JS fix for disclaimerCheck button
        run: |
          python3 - <<'PYEOF'
          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()
          inject = '''
          <script>
          (function() {
            function initDisclaimer() {
              var cb = document.getElementById('disclaimerCheck');
              var btn = document.getElementById('disclaimerAccept');
              if (!cb || !btn) return;
              cb.addEventListener('change', function() {
                btn.disabled = !this.checked;
              });
              btn.disabled = !cb.checked;
            }
            if (document.readyState === 'loading') {
              document.addEventListener('DOMContentLoaded', initDisclaimer);
            } else {
              initDisclaimer();
            }
          })();
          </script>
          '''
          fixed = html.replace('</body>', inject + '</body>')
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(fixed)
          print('JS fix injected')
          PYEOF

      - name: Deploy fixed file to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          TEAM="vatsaendo-s-projects1"
          
          # Step 1: Get SHA1 of the file (Vercel uses SHA1)
          FILE_SHA1=$(sha1sum index.html | awk '{print $1}')
          FILE_SIZE=$(wc -c < index.html)
          echo "File SHA1: $FILE_SHA1, Size: $FILE_SIZE"
          
          # Step 2: Upload file to Vercel blob store with SHA1 digest
          UPLOAD=$(curl -s -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            -H "x-vercel-digest: $FILE_SHA1" \
            --data-binary @index.html \
            "https://api.vercel.com/v2/files?teamId=$TEAM")
          echo "Upload response: $UPLOAD"
          
          # Step 3: Create new deployment referencing the file by SHA1
          DEPLOY=$(curl -s -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @- \
            "https://api.vercel.com/v13/deployments?teamId=$TEAM&forceNew=1" <<JSON
          {
            "name": "endo-vatsa-ida",
            "files": [{
              "file": "index.html",
              "sha": "$FILE_SHA1",
              "size": $FILE_SIZE
            }],
            "projectSettings": { "framework": null },
            "target": "production"
          }
          JSON
          )
          echo "Deployment response: $DEPLOY"
          echo $DEPLOY | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deployment URL:', d.get('url','N/A'))" 2>/dev/null || echo "Parse failed"
